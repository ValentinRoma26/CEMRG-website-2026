- title: Once you publish a paper
  subsec: 
    - desc: Consider disseminating your results using the <b>Public Engagement</b>
        infrastructure at KCL. Besides posting about it in your social networks,
        contact 
        <a href=https://cemrg.com/people/team#Cristobal%20Rodero>Cristobal Rodero</a>
        to tweet it using the group's Twitter account. 
        <p> You can also contact the PE team (look for the corresponding person
        in the <a href=#KCL%20staff%20to%20contact>BMEIS Professional Services Suport Summary</a>)
        to have an interview with them and publish it on the 
        <a href=https://www.kcl.ac.uk/bmeis/about-us/news>KCL news room</a>.
    - desc: <b>Back it up</b>. Wrap up the data and scripts used for the study. The idea is that
        if in the future we need to replicate it or use the data/tools of the
        paper, to be able to do it even if the person is no longer in the group.
        We backup any completed papers, associated code repos/scripts, and 
        datasets for those papers/projects. Exclude any large output files that 
        could be recreated with the code or data which we're not allowed to 
        reuse. 
        
        <p> Place each project or paper with its data and scripts in a separate 
        folder, including a README file, in the following address&#58</p>

        <p style="font-family:consolas">/bioeng408-srv/cemrg-repo/[YEAR]/[LAST NAME OF FIRST AUTHOR]_[FIRST NAME OF FIRST AUTHOR]/[PAPER TITLE]</p>
    - desc: <b>Report the back up</b>. Update 
        <a href=https://emckclac-my.sharepoint.com/:x:/g/personal/k1768830_kcl_ac_uk/EXqg1Uz2jL5Jmm7H3LDF3bMBu754SxoP6PhX4W6p-m44YA?e=DuIKZN>
        the spreadsheet</a> where we have all
        backed up projects, in the "PAPERS" sheet. 
    


