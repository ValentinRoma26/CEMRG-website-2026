- title: Communication
  subsec:
    - desc: <b><a href=https://Cemrg.slack.com> Slack </a></b>. Besides 
        Microsoft Teams, we use Slack as the main channel to communicate. If you
        do not have access to it ask 
        <a href=https://cemrg.com/people/team#Steven%20Niederer>Steve Niederer</a>.

- title: Software 
  subsec:
    - desc: <b><a href=https://bitbucket.org/account/user/electromechanics/>
        Group bitbucket</a></b>. In this repository we share software resources
        such as meshtool3d, cm2carp or catheter1dsim. If you do not have access 
        to it ask 
        <a href=https://cemrg.com/people/team#Angela%20Lee>Angela Lee</a>.
    - desc: <b>CARPentry</b>. To download the binaries for CARP and CARPentry
        access 
        <a href=https://carpentry.medunigraz.at/download/london/>this link</a>
        and ask a previous user for the username and password. 

- title: HPC access
  subsec:
