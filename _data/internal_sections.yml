- title: Useful KCL forms
  subsec:
    - desc: <b>Expense claim forms</b>. Any reasonable expense in activities 
        such as conferences or research trips should be claimed back from the 
        corresponding budget. If you don't know which grant number ask your 
        supervisor/PI. To make purchases for your research or claim expenses, 
        you will need an account on KFin. Please enrol in one of the training 
        sessions on 
        <a href=https://training.kcl.ac.uk/kcl/#he.dev/eventDetails,;eventsearch,type=BY_BEST_MATCH,s=p2p,date=FUTURE,;em,id=611cb085-c63c-47f0-b039-ac6fb83113ab> 
        this page</a>. After the session, please request an account via the 
        'Business World User Access' module on the IT Service Desk,
        <a href=https://kcl--bmcservicedesk.eu46.visual.force.com/apex/selfservicenew#/support/catalog/common> 
        https://kcl--bmcservicedesk.eu46.visual.force.com/apex/selfservicenew#/support/catalog/common</a>.
        For 'type of access required', please select 'Raise/Approve Requisitions'
        only. All staff and students are eligible to have a KFin account.
 
        <p> From August 2022, staff can only claim expenses via KFin. To have 
        the 'Expenses' module added to your KFin profile, please enrol in one of
        the training sessions on 
        <a href=https://training.kcl.ac.uk/kcl/#he.dev/eventDetails,;em,id=6722d1d1-7cb3-4803-829e-488afd178b5b>
        this page</a>. Please note that this arrangement is only applicable to 
        staff. Expense claims from students and non-staff will continue to be 
        processed by email to the relevant teams.
    - desc: <b>Travel insurance forms</b>. You need to hire a travel insure for 
        every overseas trip you make on College business at least 4 weeks before
        deaparture. Similarly as with the expense claim forms, there is one 
        <a href=https://kcl.my.salesforce.com/apex/bmcservicedesk__ssredirect?type=sr&id=a3S3X00000230CJUAY#/support/problem-requests/all/segregation>
        for students</a>, and one
        <a href=https://kcl.my.salesforce.com/apex/bmcservicedesk__ssredirect?type=sr&id=a3S3X000002ak23UAA>
        for staff</a>.

- title: Health and safety
  subsec:
    - desc: <b>Minor injuries</b>. In the kitchen there is always a first-aid kit to assist with minor injuries or 
            aches. If you see anything missing from it, please contact our designated first aider 
            <a href=https://cemrg.com/people/team#Jos%C3%A9%20Alonso%20Sol%C3%ADs-Lemus>Jos&eacute.</a>
    - desc: <b>Fire alarm</b>. If the alarm blares intermitently, prepare to leave. As soon as it starts blaring 
            continously, leave immediately. Any question please contact our designated fire warden 
            <a href=https://cemrg.com/people/team#Cesare%20Corrado>Cesare.</a>
    - desc: For any other concern contact the School Technical Manager 
        <a href=mailto:david.thakor@kcl.ac.uk>David Thakor</a>.

