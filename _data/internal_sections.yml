- title: Coffee
  subsec:
    - desc: A coffee machine is available in the kitchen. Each person is responsible for buying their own pods.

- title: Useful KCL links
  subsec:
    - desc: <b><a href=https://www.teamseer.com/auth/signin>Vacation days 
        booking</a></b>. This link is valid for staff. If you are a student, 
        talk about it with your supervisor.
    - desc: <b><a href=https://www.isd.kcl.ac.uk/internal/roombooking/browseweek.php>
