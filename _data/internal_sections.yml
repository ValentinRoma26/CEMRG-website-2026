- title: Communication
  subsec:
    - desc: <b><a href=https://Cemrg.slack.com> Slack </a></b>. Besides 
        Microsoft Teams, we use Slack as the main channel to communicate. If you
        do not have access to it ask 
        <a href=https://cemrg.com/people/team#Steven%20Niederer>Steve Niederer</a>.

- title: Software 
  subsec:
    - desc: <b><a href=https://bitbucket.org/account/user/electromechanics/>
        Group bitbucket</a></b>. In this repository we share software resources
        such as meshtool3d, cm2carp or catheter1dsim. If you do not have access 
        to it ask 
        <a href=https://cemrg.com/people/team#Angela%20Lee>Angela Lee</a>.
    - desc: <b>CARPentry</b>. To download the binaries for CARP and CARPentry
        access 
        <a href=https://carpentry.medunigraz.at/download/london/>this link</a>
        and ask a previous user for the username and password. 

- title: HPC access
  subsec:
    - desc: <b>ARCHER2</b>. To create an account and have access to ARCHER2
        (previously ARCHER) follow the steps indicated in their 
        <a href=https://docs.archer2.ac.uk/user-guide/connecting/>documentation</a>.
    - desc: <b>Tom2</b>. To create an account and have access to Tom2
        (previously Tom) fill in 
        <a href="./BLANK - HPC Project Form.doc">this form</a> and send it to 
        IT.
    
- title: Coffee
  subsec:
    - desc: We buy coffee pods in bulk to use with the coffee
        machine in the hospital's kitchen. For flavours and prices ask 
        <a href=https://cemrg.com/people/team#Hamed%20Keramati>Hamed Keramati</a>.

- title: Useful KCL links
  subsec:
    - desc: <b><a href=https://www.teamseer.com/auth/signin>Vacation days 
        booking</a></b>. This link is valid for staff. If you are a student, 
        talk about it with your supervisor.
    - desc: <b><a href=https://www.isd.kcl.ac.uk/internal/roombooking/browseweek.php>
        Room booking</a></b> for meetings or videocalls.

- title: Useful KCL forms
  subsec:
    - desc: <b>Expense claim forms</b>. Any reasonable expense in activities 
        such as conferences or research trips should be claimed back from the 
        corresponding budget. If you don't know which grant number ask your 
        supervisor/PI. You have to fill the corresponding form &#58 
        <a href=https://internal.kcl.ac.uk/about/ps/finance/ap/student-expense-form-2018.docx>
        form for students</a>, 
        <a href=https://internal.kcl.ac.uk/about/ps/finance/ap/Staff-Expense-Form-2018.docx>
        form for staff</a>.
    - desc: <b>Travel insurance forms</b>. You need to hire a travel insure for 
        every overseas trip you make on College business at least 4 weeks before
        deaparture. Similarly as with the expense claim forms, there is one 
        <a href=https://kcl.my.salesforce.com/apex/bmcservicedesk__ssredirect?type=sr&id=a3S3X00000230CJUAY#/support/problem-requests/all/segregation>
        for students</a>, and one
        <a href=https://kcl.my.salesforce.com/apex/bmcservicedesk__ssredirect?type=sr&id=a3S3X000002ak23UAA>
        for staff</a>.

- title: Health and safety
  subsec:
    - desc: <b>Minor injuries</b>. In the kitchen there is always a first-aid
        kit to assist with minor injuries or pains.
    - desc: <b>Fire alarm</b>. If the alarm blares intermitently, prepare to 
        leave. As soon as it starts blaring continously, leave immediately.
    - desc: For any other concern contact the School Technical Manager 
        <a href=mailto:david.thakor@kcl.ac.uk>David Thakor</a>.

- title: Security phone numbers
  subsec:
