      icon: quote-right 
  desc:
    Adelisa Avezzù graduated in Mathematics at the University of Bologna with a thesis in algebraic geometry, then gained her Master of Science in Mathematics at the University of Trento with curriculum on modelling and simulations for biomedical applications. Her thesis centred on numerical modelling of the human cardiovascular system to simulate brain haemodynamics in the event of neurovascular diseases. She joined the CEMRG group in October 2018 as a King’s College PhD student.<p>Her PhD research focuses on the impact of bile acids on foetal cardiac cells in order to investigate the mechanism which would cause foetal arrhythmia and stillbirth in intrahepatic cholestasis of pregnancy (ICP). She is currently working on the development of an electrophysiological model of the human foetal ventricular cardiomyocyte. The aim of her project will be to use this model to simulate the interaction between bile acids and the ion channels of the foetal cardiac cell.</p>

