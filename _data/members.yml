  desc:
    <p>Dr Devran Ugurlu received his bachelor's degree in Mathematics Engineering and master's degree in Computational Science and Engineering from Istanbul Technical University, Turkey. 
    He received his PhD in Computer Science and Engineering from Sabanci University, Turkey.</p>
    <p> His research mainly focuses on medical image analysis. For his PhD and his first postdoc project at Istanbul Technical University, he worked with automatic segmentation of fiber tracts from brain diffusion MRI. He moved to the UK in September 2020 and has been working as a postdoc with cardiac MRI images since. 
    His current work involves automatically creating patient-specific biventricular and 4-chamber meshes to model the patient's heart anatomy using deep-learning methods.</p>


