      icon: quote-right 

  desc:
    Charles recently graduated from the University of Oxford with an integrated Master's in Physics. 
    For his MPhys project, he investigated the effects of Laser Wakefield Acceleration in cluster plasmas, working in 
    the Peter Norreys group. His long-held interest in medical technology led him to join CEMRG to start his PhD in 
    October 2020.</p>
    <p>Charles' PhD focuses on using cardiac CT images to quantify cardiac function in the left atrium. He aims to 
    investigate the link between left atrial mechanics and incidents of heart failure and atrial fibrillation amongst 
    patients.</p>

- avatar: /images/members/TiffanyBaptiste.jpg
