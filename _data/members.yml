      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/marina-strocchi(8a65760c-fd5c-4084-8749-25c5e59e7e7a).html
      icon: quote-right 
  desc:
    Marina Strocchi received a bachelor's Degree in Mathematics at the University of Bologna, Italy, and a master degree
    in Applied Mathematics at the University of Trento, Italy. For her master thesis, she worked with models for the 
    simulation of arterial blood flow. She also received a Master of Research in Imaging Science at King's College 
    London.</p>
    
    <p>During her PhD at King's College London in 2017, Marina has been working with three-dimensional models for 
    cardiac electrical activation and mechanical contraction. The aim of her PhD is to develop a framework that 
    simulates physiological motion of atria and ventricles together with pressure-volume atrial and ventricular 
    dynamics. This framework was then be applied to a virtual cohort of heart failure models to investigate how 
    pressure dynamics in the major arteries change in response to cardiac resynchronization therapy. After the 
    completion of her PhD in 2021, she continued in CEMRG for a postdoctoral position funded by the British Heart 
    Foundation.

- avatar: /images/members/hamed_keramati.png
  name: Hamed Keramati
  position: 
  socials:
    - link: https://scholar.google.com.my/citations?user=aNThsN8AAAAJ&hl=en
      icon: google
  desc:
    Hamed Keramati received his master's degree in Mechanical Engineering from 
    Nanyang Technological University (NTU), Singapore, with a thesis titled 
    "Design and development of MEMS rotary fans". Subsequently, he worked as a 
    Research Associate at NTU on numerical simulation of the blood flow in the 
    aorta. Before starting his PhD study, as a Fluid Dynamics Engineer at 
    Dyson, he performed numerical and experimental analyses of cyclonic 
    separation. Hamed later started his PhD at the National University of 
    Singapore (NUS) and worked on his thesis titled "An Investigation of the 
    Blood Flow and the Vessel Displacement in the Aortic Dissection". His PhD 
    research focused on the fluid-structure interaction simulation and Monte 
    Carlo simulation of a reduced-order model of a dissected aorta. He 
    successfully defended his thesis and joined CEMRG in 2021 as a Research 
    Associate. Hamed currently works on modelling the blood flow in the heart 
    and particle tracking to optimise the design and calibration of the 
    positron emission particle tracking (PEPT) imaging for the cardiac blood flow.


