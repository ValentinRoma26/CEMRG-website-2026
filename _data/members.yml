      icon: quote-right 

  desc:
    Tiffany received her undergraduate degree in Bioengineering from the 
    University of Sheffield in 2019. There, her research project focussed on 
    simulating remodelling in skeletal muscle. She then went on to read for a 
    MSc in Biomedical Engineering at Imperial College London where she 
    specialised in biomechanics and mechanobiology.</p>

    <p>Tiffany's desire to make clinical impact through research led her to join 
    the CEMRG team in October 2021. Her PhD project aims to study the role 
    of stiffness in the development of fibrosis in the left atrium. She will also 
    investigate how changes atrial stiffness impact the progression atrial 
    fibrillation.</p>


