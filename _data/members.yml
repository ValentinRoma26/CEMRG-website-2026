      icon: quote-right 
  desc:
    Professor Steven Niederer received a Bachelor of Engineering majoring in Engineering science at the University of Auckland, New Zealand, before completing a DPhil in Computer Science at the University of Oxford, United Kingdom. He received a UK Engineering and Physical Sciences Research Council (EPSRC) post-doctoral fellowship on modelling heart failure before being appointed as a lecturer at King’s College London. Since joining King’s College Steven has developed a research group focused on developing and applying computational simulation and image analysis techniques to better understand cardiac physiology, pathologies and treatments. His work is characterised by working across disciplines spanning statistics, computer science, engineering, physiology and cardiology.

- avatar: images/members/martin.jpg
  name: Martin Bishop
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=YKkAus4AAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/martin.bishop.html
      icon: quote-right 
  desc:
    Following his undergraduate degree in Physics (University of Oxford, UK), Martin Bishop studied for a PhD in Computational Biology (University of Oxford, UK), specialising in Computational Cardiac Modelling, with a PhD project concerned with simulating the fluorescent signals obtained from optical mapping recordings of cardiac electrophysiology. In his first postdoc, Martin developed fine-scaled computational cardiac models directly from high-resolution MRI data, which were used in his later 4-year Sir Henry Wellcome Postdoctoral Fellowship to investigate the role of anatomical heterogeneity in the mechanisms of initiation and maintenance of arrhythmias.</p><p>Following his Fellowship, Martin took-up an academic position at King’s College London in the Department of Biomedical Engineering, where he is now a Reader in Computational Cardiac Electrophysiology. His core focus is to understand arrhythmia and electrotherapy mechanisms in different types of structural heart disease to directly improve clinical practice via enhanced arrhythmic risk stratification, and optimising implanted device therapy and catheter ablation. Martin’s work is facilitated by the use of clinical imaging data and electrophysiology recordings for both model construction and validation, including direct interaction with medical device and mapping companies, and basic science experimentalists. His current research interests involve the integration of computational models with advanced machine learning approaches to facilitate the integration of modelling into direct clinical practice.

- avatar: images/members/Angela_Lee.JPG
  name: Angela Lee
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=Mbz_YYEAAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/angela.lee.html
      icon: quote-right 
  desc:
    Dr Angela WC Lee received her PhD in Biomedical Engineering from the University of Auckland, New Zealand. Her main research interest is in modelling cardiac resynchronization therapy using patient-specific models of the heart. Previously, her work focused on modelling the chronic changes in the heart’s electrophysiology, mechanics and geometry due to cardiac resynchronisation therapy and the effect that these changes will have on the optimal lead location. The current focus of her work is on developing a product for image-guided optimisation of wireless endocardial pacemakers for patients undergoing cardiac resynchronization therapy. This project, in collaboration with medical imaging companies, device manufacturers, and clinicians, aims to translate image-analysis and advanced simulations tools into the clinic to assist in pre-procedural planning for wireless endocardial CRT.

