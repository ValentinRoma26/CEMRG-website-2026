  desc:
    Hugh O’Brien graduated from Trinity College Dublin with a BA in Psychology and Imperial College London with an MSc in Computer Science. He also completed a MRes in Imaging Science at King's College London. In between he worked at PLOS on some of their flagship journals. Prior to starting his PhD Hugh was a software engineer at Overleaf, a collaborative science writing platform for LaTeX.</p><p>His PhD, which started in 2018,  focuses on machine learning based approaches to improve the viability of CT for invasive cardiac procedure guidance with an initial focus on infarct region localisation.

- avatar: images/members/Adelisa.jpg
  name: Adelisa Avezzù
  position: 
  socials:
