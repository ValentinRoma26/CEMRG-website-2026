      icon: quote-right 
  desc:
    Dr Cesare Corrado obtained his  master degree in Aerospace Engineering at 
    the Politecnico di Milano, Italy and his PhD degree in Civil and 
    Environmental Engineering at the University of Padua, Italy. </p>
    <p>His earlier research concerned computational models for multi-physics 
    problems and data assimilation techniques (reverse engineering). His current
     research interests focus on the development of clinically tractable methods 
     to build personalised computational models from clinical data (MRI, 
     electrograms) and on the quantification of the model uncertainty, with a 
     particular interest in predictive performance. His research aims to 
     develop new tools to improve the treatment of cardiac arrhythmias.

