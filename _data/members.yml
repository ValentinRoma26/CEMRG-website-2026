    Cristobal Rodero received his bachelor's degree in Mathematics from the 
    Universitat de València, Spain in 2016. Cristobal completed a MSc of Research 
    in Mathematics jointly awarded by Universitat de València and Universitat 
    Politècnica de València. At the same time, he completed a second MSc in 
    Computational Mathematics by Universitat Jaume I in Castellón. </p>
    
    <p>Cristobal started his PhD in 2017 in Biomedical Engineering, both in 
    CEMRG and in CMIB (Cardiac Modelling and Imaging Biomarkers) group, supervised by Profs Steven Niederer and Pablo Lamata. His PhD focussed on 
    studying shape and function in the heart and how they interact using simulations. He also worked on calibration of models using emulators. In 
    February 2022 he started a position at CEMRG as a research assistant studying cardiac remodelling in longitudinal studies.

- avatar: /images/members/Adelisa.jpg
  name: Adelisa Avezzù
  position: 
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/adelisa-avezzu(ffd31e3b-0175-4de4-b643-335f8029a143).html
      icon: quote-right 
  desc:
    Adelisa Avezzù graduated in Mathematics at the University of Bologna with a thesis in algebraic geometry, then gained her Master of Science in Mathematics at the University of Trento with curriculum on modelling and simulations for biomedical applications. Her thesis centred on numerical modelling of the human cardiovascular system to simulate brain haemodynamics in the event of neurovascular diseases. She joined the CEMRG group in October 2018 as a King’s College PhD student.<p>Her PhD research focuses on the impact of bile acids on foetal cardiac cells in order to investigate the mechanism which would cause foetal arrhythmia and stillbirth in intrahepatic cholestasis of pregnancy (ICP). She is currently working on the development of an electrophysiological model of the human foetal ventricular cardiomyocyte. The aim of her project will be to use this model to simulate the interaction between bile acids and the ion channels of the foetal cardiac cell.</p>

- avatar: /images/members/shuang_qian.png
  name: Shuang Qian
  position:
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/shuang-qian(5f0d649b-2cc7-4c5a-aeb9-36209a842209).html
      icon: quote-right

  desc:
    Dr Shuang Qian received her undergraduate degree in Electronic and Electrical engineering at the University of 
    Birmingham, UK, before completing a PhD degree at the same university. Her PhD project is about modelling the 
    cardiac electrodynamics in a larval zebrafish heart incorporating detailed cellular arrangements and intercellular 
    connectivity. Since joining CEMRG in 2020, her work focused on assessing and optimising electrotherapy to improve 
    the function of implanted devices by constructing and validating computational models, based on clinical images 
    and electrophysiological recorded data. Her current research interest also includes integrating advanced machine 
    learning approaches with models for direct applications in current clinical practice and making digital twins from 
    data sets in the Biobank that evolve through time.


