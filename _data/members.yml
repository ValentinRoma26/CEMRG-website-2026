  desc:
    <p> Following my undergraduate degree in Physics (Oxford, 1999-2003), I studied for a PhD in Computational Biology (Oxford, 2003-2007), specialising in Computational Cardiac Modelling. My PhD project was concerned with simulating the fluorescent signals obtained from optical mapping recordings of cardiac electrophysiology. In my postdoc (2007-8), I developed fine-scaled computational cardiac models directly from high-resolution MRI data. In October 2008, I began a 4-year Sir Henry Wellcome Postdoctoral Fellowship to investigate the role of anatomical heterogeneity in the mechanisms of initiation and maintenance of arrhythmias.</p><p> In 2011, took-up an academic position at King’s College London in the Department of Biomedical Engineering, where I am now a Reader in Computational Cardiac Electrophysiology. My core focus is to understand arrhythmia and electrotherapy mechanisms in different types of structural heart disease to directly improve clinical practice via enhanced arrhythmic risk stratification, and optimising implanted device therapy and catheter ablation. My work is facilitated by the use of clinical imaging data and electrophysiology recordings for both model construction and validation, including direct interaction with medical device and mapping companies, and basic science experimentalists. My current research interests involve the integration of computational models with advanced machine learning approaches to facilitate the integration of modelling into direct clinical practice.</p>





