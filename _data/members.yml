  desc:
    Cristobal Rodero received his bachelor's degree in Mathematics by the Universitat de València, Spain in 2016. Cristobal coursed a MSc of Research in Mathematics shared by Universitat de València and by Universitat Politècnica de València. At the same time, he went through another MSc in Computational Mathematics by Universitat Jaume I in Castellón. Cristobal started to specialise in applied mathematics focused on simulation in biomedicine.</p><p>Cristobal is part of the Marie Skłodowska-Curie Actions training network PIC (Personalised In-Silico Cardiology), where he is in constant collaboration with people working across the EU in academic, clinical and company-like environments. His work is on Cardiac Resynchronization Therapy (CRT), where the goal is to recover the synchrony of the ventricles pumping.</p><p>Cristobal started his PhD in 2017 in Biomedical Engineering, both in CEMRG and in Cardiac Modelling and Imaging Biomarkers group, focused on modelling the effect of new types of CRT pacemakers (multipolar, endocardial…) in terms of cardiac electrophysiology and mechanics.

