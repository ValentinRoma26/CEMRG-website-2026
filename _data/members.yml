      icon: quote-right 
  desc:
    Adelisa Avezzù graduated in Mathematics at the University of Bologna with a thesis in algebraic geometry, then gained her Master of Science in Mathematics at the University of Trento with curriculum on modelling and simulations for biomedical applications. Her thesis centred on numerical modelling of the human cardiovascular system to simulate brain haemodynamics in the event of neurovascular diseases. She joined the CEMRG group in October 2018 as a King’s College PhD student.<p>Her PhD research focuses on the impact of bile acids on foetal cardiac cells in order to investigate the mechanism which would cause foetal arrhythmia and stillbirth in intrahepatic cholestasis of pregnancy (ICP). She is currently working on the development of an electrophysiological model of the human foetal ventricular cardiomyocyte. The aim of her project will be to use this model to simulate the interaction between bile acids and the ion channels of the foetal cardiac cell.</p>

- avatar: images/members/Damiano_F.JPG
  name: Damiano Fassina
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=a73HevYAAAAJ
      icon: google
  desc:
    Damiano Fassina made his first steps in the academic world in Italy, where he achieved a three years Bachelor Degree in Biomedical Engineering. Subsequently, he was awarded with a two years Master Degree in Bioengineering. Both titles were conferred from the University of Padova.</p><p>In October 2018 he moved to London to start a PhD, and since then he has been a member of King's College CEMRG. Damiano’s PhD project involves the creation of a model of human induced pluripotent stem cells derived cardiomyocytes, for regenerative medicine application. His investigations through models at cellular and tissue level aim to achieve better understanding of stem cells derived cardiomyocytes’ electrophysiological behavior. Damiano’s research work is thus focused towards the successful coupling of engineered cardiomyocytes with adult myocytes, and assess the feasibility of replacing damaged heart tissue with engineered patches.
    