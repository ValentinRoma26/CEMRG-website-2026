    Steven Niederer received a Bachelor of Engineering (hons) majoring in Engineering science at the University of Auckland, New Zealand, before completing a DPhil in Computer Science on “A Coupled Electromechanics model of the Rat Left Ventricle” at the University of Oxford, United Kingdom in 2008. He received a UK Engineering and Physical Sciences Research Council (EPSRC) post-doctoral fellowship on modelling heart failure before being appointed as a lecture at King’s College London. Since joining King’s College Steven has developed a research group focused on developing and applying computational simulation and image analysis techniques to better understand cardiac physiology, pathologies and treatments. His work is characterised by working across disciplines spanning statistics, computer science, engineering, physiology and cardiology. The group is outward facing and collaborates widely with academics, clinicians and industry to develop new cardiac analytics, diagnostics and treatments. 
