      icon: quote-right 
  desc:
    Marina Strocchi received a bachelor's Degree in Mathematics at the University of Bologna, Italy, and a master degree in Applied Mathematics at the University of Trento, Italy. For her master thesis, she worked with models for the simulation of arterial blood flow. She also received a Master of Research in Imaging Science at King's College London.</p><p>Since the start of her PhD at King's College London in 2017, Marina has been working with three-dimensional models for cardiac electrical activation and mechanical contraction. The aim of her PhD is to develop a framework that simulates physiological motion of atria and ventricles together with pressure-volume atrial and ventricular dynamics. This framework will then be applied to a virtual cohort of heart failure models to investigate how pressure dynamics in the major arteries change in response to cardiac resynchronization therapy.

