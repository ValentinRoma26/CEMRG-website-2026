      icon: quote-right

  desc:
    Dr Shuang Qian received her undergraduate degree in Electronic and Electrical engineering at the University of 
    Birmingham, UK, before completing a PhD degree at the same university. Her PhD project is about modelling the 
    cardiac electrodynamics in a larval zebrafish heart incorporating detailed cellular arrangements and intercellular 
    connectivity. Since joining CEMRG in 2020, her work focused on assessing and optimising electrotherapy to improve 
    the function of implanted devices by constructing and validating computational models, based on clinical images 
    and electrophysiological recorded data. Her current research interest also includes integrating advanced machine 
    learning approaches with models for direct applications in current clinical practice and making digital twins from 
    data sets in the Biobank that evolve through time.


- avatar: /images/members/hassan_zaidi.png
  name: Hassan Zaidi
  position: 
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/hassan-zaidi(e74a9ef2-590f-4e0e-a6da-9ff9f1c5c719).html
      icon: quote-right 

  desc:
    Hassan graduated as an applied mathematician from The University of Nottingham, going on to complete an MSc in Applied Statistics with Operational Research and a PGCE in mathematics. His background has seen him work in various fields&#58; Nottinghamshire police, teaching, research, start-ups and the NHS. </p><p>Hassan’s project is based on the understanding that susceptibility to cardiac arrhythmias represents a highly complex system with intrinsic dependence on pathological structural and functional cardiac properties. Current guidelines suggest the use of a compromised LV ejection fraction (LVEF) to guide ICD implantation; however, only a third of SCD cases exhibit low LVEF. Functional biomarkers (from ECG recordings) and structural biomarkers (from MR imaging) have been independently correlated with arrhythmia risk, however, they have yet to demonstrate sufficient power to alter current clinical practice. Therefore, Hassan’s hypothesis is that a risk prediction model which combines both structural and functional features, augmented by structure-function simulation-based features, will significantly enhance risk stratification for ICD requirement.</p>

