  socials:

  desc:
    Ludovica Cicci obtained her BSc in Mathematics and her MSc in Applied 
    Mathematics at Sapienza Universit&agrave; di Roma. In 2021 she completed a 
    PhD degree at Politecnico di Milano, where she was involved in an ERC 
    project for the construction of cardiac digital twins, focusing on the 
    development of reduced order models to speed up the computation of 
    mechanics simulations.</p>
    
    <p>After one more year at Politecnico di Milano as 
    post-doc in mathematical models and methods for personalized and precision 
    medicine, she joined CEMRG as research associate in Novermber 2022. 
    Making use of virtual simulations on patient-specific geometries, 
    she is currently investigating the impact of electrodes location and other 
    electrophysiology parameters on electrocardiograms.</p>




- avatar: /images/members/samaneh_lashkarinia.jpg
  name: Samaneh Lashkarinia
  position: 
  socials:
    - link: https://scholar.google.com/citations?user=giHgul8AAAAJ&hl=en
      icon: google
    - link: https://www.imperial.ac.uk/people/s.lashkarinia
      icon: quote-right
  desc:
    Samaneh Lashkarinia's research interests lie in Computational Biomechanics and Mechanobiology. She earned her PhD from the Mechanical Engineering department at Koc University in Turkey in August 2020. Her thesis focused on the computational growth and remodelling of heart vessels, as well as virtual surgical planning for congenital heart defects, aiding surgeons in selecting the most effective surgical option. Samaneh received the prestigious Newton International Fellowships 2020 award to support her post-doctoral fellowship in the Bioengineering department at Imperial College London in 2020. During her fellowship, she developed computational techniques to understand the Biomechanics of diseased embryonic hearts and identify the Mechanobiological pathways of resulting malformations, aiding in the diagnosis and prevention of heart defects before birth. </p>
    
    <p> Samaneh joined CEMRG in September 2023. She works on computational modelling of atrial fibrillation patients treated with cardiac resynchronization therapy to compare the effects of atrioventricular node ablation and atrial fibrillation ablation on echocardiographic and symptomatic outcomes in patients with CRT and suboptimal biventricular pacing.

- avatar: /images/members/rosie_barrows.jpeg
  name: Rosie Barrows
  position: 
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/rosie-barrows
      icon: quote-right
  desc:
    Rosie graduated from the University of Oxford in 2021 with an integrated master's degree in Engineering Science. For her final year project, she completed both experimental and simulation-based research into the effect of surface roughness on thermal propulsion system efficiency, working with Professor Felix Leach in the Thermal Propulsion Systems Research Group. </p>
    
    <p> Having chosen papers on Health Informatics and Biomechanics in her final year, she decided to join CEMRG in October 2021 to pursue her interest in the mechanics of the heart. Rosie's PhD focuses on using four chamber models to investigate the effects of atrial fibrillation (AF) on ventricular output. By considering the individual and synergistic effects of AF, this research will compare different treatment strategies for AF by performing electromechanical simulations on a cohort of patient-specific meshes.

- avatar: /images/members/Photo_Arthur_Lefebvre.png
  name: Arthur Lefebvre
  position: 
  socials:
    - link: https://scholar.google.com/citations?user=j17VyUQAAAAJ&hl=en
      icon: google
    - link: https://ai4health.io/supervisors/
      icon: quote-right
  desc:
    Arthur holds both a Bachelor's and a Master's degree in Electrical Engineering, specializing in Telecommunications and Artificial Intelligence from the Université de Mons (UMONS). He further completed a Master of Science in Bioengineering with a Medical Specialization at the University of California, San Diego (UCSD), as a recipient of the BAEF fellowship. His academic work has centered on the intersection of AI and cardiovascular imaging. Arthur previously served as a Research Assistant in the Trayanova Lab at Johns Hopkins University, where he contributed to segmentation projects focused on atrial structures, ventricles, and the quantification of scar and fibrosis in late gadolinium enhancement (LGE) MRI scans.</p>

    <p>In 2024, he joined CEMRG as PhD student in AI and Machine Learning within the AI4Health program at Imperial College London. His research centers on developing Trustworthy Digital Twins for Healthcare, specifically assessing the credibility of patient-specific cardiac simulation models through advanced computational modeling and AI. In collaboration with the FDA and industry partners, Arthur's work aims to bridge research with clinical application, driving solutions that are FDA-ready.

- avatar: /images/members/Zhong_Wei.jpg
  name: Wei Zhong 
  position: 
  socials:
  desc:
    Wei Zhong joined CEMRG in October 2024 as a PhD student (4-year BHF-DTP). Before that, Wei completed a Bachelor's degree in Mathematics and Statistical Science at University College London and later pursued a Master's degree in Applied Computational Science and Engineering at Imperial College London. Prior to his Master's studies, Wei worked as a Research Assistant at the Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences, in the Institute of Medical Engineering (2021–2022). His experience spans computational mathematics, numerical modelling, data science, machine learning, and statistical analysis, with a keen interest in translational medicine and its applications in healthcare.</p>.
    
    <p>Wei’s research focuses on creating sex-specific cardiac digital twins to model multi-scale differences in heart function and disease presentation influenced by sex.


