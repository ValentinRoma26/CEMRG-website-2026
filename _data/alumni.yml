  name: Elias Karabelas
  position: 
  desc:
    Elias Karabelas received his Bachelor of Science in Applied Mathematics and his Master of Science in Industrial Mathematics from Graz University of Technology, Austria. He received his PhD in 2015 from Graz University of Technology under the supervison of Prof Olaf Steinbach, Prof Ulrich Langer, and Prof Gernot Plank. During his PhD he was member of the special research group "Mathematical Optimization and Application in Medical Science" (MOBIS). After that he joined the computational cardiology lab of Prof Gernot Plank at the Medical University of Graz, Austria. Since September 2019, Elias Karabelas is a visiting Research Associate at the CMERG group. His main research interests are computational fluid dynamics on moving/non-moving domains with particular focus on hemodynamics, non-linear solid dynamics in the context of electromechanics of the human heart, and the simulation of those problems using high performance computing.

