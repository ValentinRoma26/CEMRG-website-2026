- avatar: /images/members/Phillip.jpg
  name: Philip Gemmell
  position:
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/philip.gemmell.html
      icon: quote-right
  desc:
    After completing his MPhysPhil in Physics & Philosophy, Dr Philip Gemmell moved on to complete his DPhil in Systems 
    Biology at the University of Oxford, specialising in Computational Biology. His dissertation focussed on 
    reproducing experimentally observed variation in cardiac electrophysiology using variability in cellular ion 
    channels as the underlying cause, and the potential consequences of this variability in the cardiac response to 
    pathological conditions. He then expanded and refined these techniques while working at Clyde Biosciences while 
    looking to determine the mechanisms of variation between populations of stem cell derived heart cells. He 
    subsequently joined CEMRG until 2022, where he developed interest in whole torso computational modelling, with specific 
    focus on the effect of scar on the electrical dynamics of the heart, and how subtle changes in the clinical 
    observations can be used to determine properties of myocardial scar prior to imaging.

- avatar: /images/members/caroline-r.JPG
  name: Caroline Roney
  position:
  socials:
    - link: https://scholar.google.com/citations?user=xfRxPlUAAAAJ&hl=en&oi=ao
      icon: google
    - link: https://www.kcl.ac.uk/people/caroline-roney
      icon: quote-right
  desc:
    Dr Caroline Roney is a Medical Research Council Skills Development Fellow. She has a background in both 
    mathematics and biomedical engineering, with an MMath in Mathematics from the University of Oxford, and an MRes in 
    Biomedical Research from Imperial College London. She received her PhD degree in signal processing of cardiac 
    arrhythmia data from the Department of Bioengineering, Imperial College London, and then worked in the 
    computational modelling team at Liryc, Bordeaux. Since Caroline joined CEMRG in 2018, her research interests are 
    in developing engineering techniques for investigating the mechanisms that underlie atrial fibrillation. She uses a 
    combination of signal processing, machine learning and computational modelling techniques to develop novel methodologies for 
    investigating atrial fibrillation mechanisms from clinical imaging data and electrical recordings. The ultimate 
    aim of her research is to translate developed tools for analysing electrical and imaging data to clinically predict 
    optimal patient specific ablation strategies. In 2021 she started a role as a lecturer in Computational Medicine in 
    Queen Mary's University and a role as visiting lecturer in King's College London.


