    Hugh O’Brien graduated from Trinity College Dublin with a BA in Psychology 
    and Imperial College London with an MSc in Computer Science. He also 
    completed a MRes in Imaging Science at King's College London. In between 
    he worked at PLOS on some of their flagship journals. Prior to starting his 
    PhD Hugh was a software engineer at Overleaf, a collaborative science 
    writing platform for LaTeX.</p>
    
    <p>His PhD at CEMRG, from 2018 to 2022, focused on machine learning based 
    approaches to improve the viability of CT for invasive cardiac procedure 
    guidance with an initial focus on infarct region localisation. His next role
    was as senior bioinformatics scientist in Achilles Therapeutics.


- avatar: /images/members/SLongobardi.JPG
  name: Stefano Longobardi
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=9QMyMPoAAAAJ&hl=it
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/stefano-longobardi(893da066-9130-4763-ac1e-317fcda9942d).html
      icon: quote-right
  desc:
    Stefano Longobardi graduated in Mathematics at Sapienza - University of 
    Rome, Italy. He then obtained a Master's Degree in Mathematics applied to 
    Life Sciences from University of Trento, Italy, with final thesis project 
    focused on a novel non-invasive technique to estimate the pressure jump 
    inside blood vessels. From 2018 to 2022, Stefano did PhD in Biomedical 
    Engineering at King's College London, working on a multi-scale model of 
    bi-ventricular rat hearts. He aims to identify drug molecular targets which 
    are strongly linked to heart mechanics, in order to recover impaired left 
    ventricle contractility function in pressure-overload-induced cardiac 
    hypertrophic rat hearts. In order to do this, Stefano is employing 
    computational models of cellular electrophysiology and calcium dynamics, 
    sarcomere contraction and whole-organ mechanics, and lately some supervised 
    learning techniques such as Gaussian processes and support vector machines. 
    Along with his lifelong passion for mathematical formalism and abstract 
    structures, Stefano has got a wide range of science-related interests 
    including biology, quantum physics and astronomy. His next position was as
    quantitative systems toxicologist at GSK.


- avatar: /images/members/Caroline-Costa.JPG
  name: Caroline Mendon&ccedil;a Costa
  position: 
  socials:
    - link: https://scholar.google.com/citations?user=FIqJvNsAAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/caroline.mendonca_costa.html
      icon: quote-right 
  desc:
    Dr. Caroline Mendon&ccedil;a Costa received her undergraduate degree in Computer 
    Science and her master’s degree on Computational Modelling from the Federal 
    University of Juiz de Fora, Brazil. She received her Ph.D. degree in 
    Numeric Mathematics and Computational Modelling from the University of 
    Graz, Graz, Austria. From July 2016 to September 2021, Caroline was a 
    postdoctoral research associate at CEMRG. Her research focused on investigating 
    arrhythmogenesis in infarct patients undergoing cardiac ressynchronisation 
    therapy. Previously, she has worked on cell modelling of Chagas’ disease 
    (Fisiocomp, Brazil), with RNA transcription models of viral infection 
    (Bioquant, Germany), and with finite element and parameterization 
    techniques to model fibrosis (Computational Cardiology Research Group, 
    Austria). Her broader research interests include methodological and applied 
    aspects of computational modelling of cardiac electrophysiology and image 
    analysis, with emphasis on building patient-specific models of the heart to 
    investigate the role of electrophysiological and structural remodelling on 
    ventricular arrhythmias. Her next role was as a data scientist in iTech 
    Media.

- avatar: /images/members/Orod_Razeghi.jpeg
  name: Orod Razeghi
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=OGvOBkwAAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/orod.razeghi.html
      icon: quote-right 
  desc:
    Dr Orod Razeghi received his Bachelor of Science in Computer Science with 
    Robotics from the University of Nottingham. He holds a PhD in Information 
    Technology from the same university. His PhD focused on developing 
    "Human in the Loop" algorithms for understanding visual content, 
    in particular interactive methods of object recognition for medical 
    applications. His interests primarily lie at the intersection of computer 
    vision, medical imaging and machine learning. Since joining the department 
    in September 2015 until April 2021, he developed interactive image 
    processing, computer vision, and machine learning algorithms for 
    analysis of cardiac images. His research software has been used for 
    preprocedural planning in clinical trials. His next role was as senior
    research software developer at University College London.


- avatar: /images/members/elias_karabelas_new_cropped.jpg
  name: Elias Karabelas
  position: 
  desc:
    Elias Karabelas received his Bachelor of Science in Applied Mathematics and 
    his Master of Science in Industrial Mathematics from Graz University of 
    Technology, Austria. He received his PhD in 2015 from Graz University of 
    Technology under the supervison of Prof Olaf Steinbach, Prof Ulrich Langer,
    and Prof Gernot Plank. During his PhD he was member of the special research
    group "Mathematical Optimization and Application in Medical Science" 
    (MOBIS). After that he joined the computational cardiology lab of Prof 
    Gernot Plank at the Medical University of Graz, Austria. From September 
    2019 to February 2020, Elias Karabelas was a visiting Research Associate at
    CEMRG. His main research interests are computational fluid 
    dynamics on moving/non-moving domains with particular focus on hemodynamics, 
    non-linear solid dynamics in the context of electromechanics of the human
    heart, and the simulation of those problems using high performance 
    computing. His next role was as a senior postdoc at the Institute of 
    Mathematics and Scientific Computing in the University of Graz. From March 2023 on he will lead the Young Researcher
    Group (YRG) 'CICLOPS --- Computational Inference of Pressure Fields from Non‐Invasively Measured Flow Patterns' 
    funded by <a href="https://biotechmedgraz.at/en/about/"> BioTechMed-Graz </a>.

- avatar: /images/members/GBalaban.jpeg
  name: Gabriel Balaban
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=hZ-onMUAAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/gabriel.balaban.html
      icon: quote-right 
  desc:
    Dr. Gabriel Balaban completed his BSc in mathematics at Trent University in 
    Canada in 2008, and worked as an IT consultant for a year and half in 
    Germany before undertaking an MSc in mathematics at the University of Oslo 
    in 2012. He completed his PhD in computer science on the topic of data 
    assimilation in cardiac mechanics in 2017 in a joint collaboration between 
    Simula Research Laboratory and Oslo University Hospital.</p>
    
    <p>Dr. Balaban was a postdoctoral fellow at CEMRG. His work incorporated 
    techniques from computational modelling and medical image analysis to 
    uncover the mechanisms of cardiac arrhythmias in nonischemic heart disease. 
    His next role was as a postdoctoral researcher at the Simula Research 
    Laboratory in Oslo, Norway.</p>
