      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/orod.razeghi.html
      icon: quote-right 
  desc:
    Dr Orod Razeghi received his Bachelor of Science in Computer Science with 
    Robotics from the University of Nottingham. He holds a PhD in Information 
    Technology from the same university. His PhD focused on developing 
    "Human in the Loop" algorithms for understanding visual content, 
    in particular interactive methods of object recognition for medical 
    applications. His interests primarily lie at the intersection of computer 
    vision, medical imaging and machine learning. Since joining the department 
    in September 2015 until April 2021, he developed interactive image 
    processing, computer vision, and machine learning algorithms for 
    analysis of cardiac images. His research software has been used for 
    preprocedural planning in clinical trials. His next role was as senior
    research software developer at University College London.


- avatar: /images/members/Elias.JPG
  name: Elias Karabelas
  position: 
  desc:
    Elias Karabelas received his Bachelor of Science in Applied Mathematics and 
    his Master of Science in Industrial Mathematics from Graz University of 
    Technology, Austria. He received his PhD in 2015 from Graz University of 
    Technology under the supervison of Prof Olaf Steinbach, Prof Ulrich Langer,
    and Prof Gernot Plank. During his PhD he was member of the special research
    group "Mathematical Optimization and Application in Medical Science" 
    (MOBIS). After that he joined the computational cardiology lab of Prof 
    Gernot Plank at the Medical University of Graz, Austria. From September 
    2019 to February 2020, Elias Karabelas was a visiting Research Associate at
    CEMRG. His main research interests are computational fluid 
    dynamics on moving/non-moving domains with particular focus on hemodynamics, 
    non-linear solid dynamics in the context of electromechanics of the human
    heart, and the simulation of those problems using high performance 
    computing. His next role was as a senior postdoc at the Institute of 
    Mathematics and Scientific Computing in the University of Graz.

