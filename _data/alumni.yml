      icon: quote-right 

  desc:
    Charles graduated from the University of Oxford with an integrated Master's in Physics. 
    For his MPhys project, he investigated the effects of Laser Wakefield Acceleration in cluster plasmas, working in 
    the Peter Norreys group. His long-held interest in medical technology led him to join CEMRG to start his PhD in 
    October 2020.</p>
    <p>Charles' PhD focused on using cardiac CT images to quantify cardiac function in the left atrium. He investigated the link between left atrial mechanics and incidents of heart failure and atrial fibrillation amongst 
    patients.</p>
    After his PhD, Charles went to Stanford University as a Postdoctoral Scholar.


- avatar: /images/members/hassan_zaidi.png
  name: Hassan Zaidi
  position: 
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/en/persons/hassan-zaidi(e74a9ef2-590f-4e0e-a6da-9ff9f1c5c719).html
      icon: quote-right 

  desc:
    Hassan graduated as an applied mathematician from The University of Nottingham, going on to complete an MSc in Applied Statistics with Operational Research and a PGCE in mathematics. His background has seen him work in various fields&#58; Nottinghamshire police, teaching, research, start-ups and the NHS. </p>
    
    <p>Hassan’s PhD project was based on the understanding that susceptibility to cardiac arrhythmias represents a highly complex system with intrinsic dependence on pathological structural and functional cardiac properties. Current guidelines suggest the use of a compromised LV ejection fraction (LVEF) to guide ICD implantation; however, only a third of SCD cases exhibit low LVEF. Functional biomarkers (from ECG recordings) and structural biomarkers (from MR imaging) have been independently correlated with arrhythmia risk, however, they have yet to demonstrate sufficient power to alter current clinical practice. Therefore, Hassan’s hypothesis was that a risk prediction model which combines both structural and functional features, augmented by structure-function simulation-based features, will significantly enhance risk stratification for ICD requirement. He completed his PhD on February 2024.</p>

- avatar: /images/members/hamed_keramati.png
  name: Hamed Keramati
  position: 
  socials:
    - link: https://scholar.google.com.my/citations?user=aNThsN8AAAAJ&hl=en
      icon: google
  desc:
    Hamed Keramati received his master's degree in Mechanical Engineering from 
    Nanyang Technological University (NTU), Singapore, with a thesis titled 
    "Design and development of MEMS rotary fans". Subsequently, he worked as a 
    Research Associate at NTU on numerical simulation of the blood flow in the 
    aorta. Before starting his PhD study, as a Fluid Dynamics Engineer at 
    Dyson, he performed numerical and experimental analyses of cyclonic 
    separation. Hamed later started his PhD at the National University of 
    Singapore (NUS) and worked on his thesis titled "An Investigation of the 
    Blood Flow and the Vessel Displacement in the Aortic Dissection". His PhD 
    research focused on the fluid-structure interaction simulation and Monte 
    Carlo simulation of a reduced-order model of a dissected aorta. He 
    successfully defended his thesis and joined CEMRG in 2021 as a Research 
    Associate. </p>
    
    <p> During this period, Hamed worked on modelling the blood flow in the heart and particle tracking to optimise the design and calibration of the 
    positron emission particle tracking (PEPT) imaging for the cardiac blood flow. His next role was as a research associate at the University of New South Wales.


- avatar: /images/members/pranav_bhagirath_resized.jpg
  name: Pranav Bhagirath
  position: 
  socials:

  desc:
    In the past decade, Pranav's scientific efforts have been dedicated towards 
    studying the complex relationship between arrhythmogenic substrate and 
    arrhythmias. Pranav's found his passion in developing, integrating and 
    applying hybrid imaging using both cardiac MRI and computational 
    modelling.</p> 
    
    <p>Pranav's PhD was a fusion between the fields of cardiac imaging and 
    electrophysiology where he focused at the non-invasive assessment of 
    arrhythmogenic substrate using Cardiac MRI and 3D ECG imaging. 
    A significant part of Pranav's work consisted of implementing a finite 
    element model based computational workflow which was clinically suitable 
    for efficient personalized simulations. In addition, his research was also 
    focused at investigating the utility of Cardiac MRI for augmentation and 
    guidance of catheter ablation procedures.</p>
    
    <p>After finishing his training as a Cardiologist, Pranav started a 
    post-doctoral fellowship at CEMRG from 2022 to 2023 where his research work has been a joint 
    effort between the departments of Biomedical Engineering and Cardiology 
    with a focus on improving arrhythmic substrate assessment to eventually 
    improve ablation efficacy. Pranav ganied valuable experience in 
    integrating and blending the expertise from both the computational and 
    clinical domain. His next role was as a fellow cardiac electrophysiologist at Amsterdam UMC.</p>

- avatar: /images/members/matteo_salvador.jpg
  name: Matteo Salvador
  position:
  socials:
    - link: https://scholar.google.com/citations?user=PJ46PfEAAAAJ
      icon: google

  desc:
    Matteo Salvador received his Bachelor of Science in Mathematical Engineering ans his Master of Science in 
    Computational Science and Engineering from Politecnico di Milano, Italy. He completed his PhD in Mathematical 
    Models and Methods for Engineering at Politecnico di Milano under the supervision of Prof. Alfio Quarteroni. He 
    worked in the framework of the iHeart project, whose aim is to create a fully integrated human heart for the 
    accurate and efficient numerical simulation of the cardiac function. Specifically, he developed comprehensive 
    mathematical models blended with novel numerical methods and Scientific Machine Learning for cardiac 
    electromechanics. </p>
    
    <p> Matteo Salvador was a visiting research fellow at CEMRG since September 2022 to December 2022. He built 
    neural network-based reduced-order models to perform four-chamber heart electromechanical simulations in short 
    computational times and by avoiding the use of high performance computing. His next role was as a postdoctoral 
    researcher at the Cardiovascular Biomechanics Computation Lab at Stanford.

- avatar: /images/members/Damiano_F.JPG
  name: Damiano Fassina
  position: 
  socials:
    - link: https://scholar.google.co.uk/citations?user=a73HevYAAAAJ
      icon: google
  desc:
    Damiano Fassina made his first steps in the academic world in Italy, where 
    he achieved a three years Bachelor Degree in Biomedical Engineering. 
    Subsequently, he was awarded with a two years Master Degree in 
    Bioengineering. Both titles were conferred from the University of Padova.</p>
    
    <p>In October 2018 he moved to London to start a PhD, and then he started as 
    a member of King's College CEMRG. Damiano’s PhD project involved the 
    creation of a model of human induced pluripotent stem cells derived 
    cardiomyocytes, for regenerative medicine application. His investigations 
    through models at cellular and tissue level aimed to achieve better 
    understanding of stem cells derived cardiomyocytes’ electrophysiological 
    behavior. Damiano’s research work was thus focused towards the successful 
    coupling of engineered cardiomyocytes with adult myocytes, and assess the 
    feasibility of replacing damaged heart tissue with engineered patches. He 
    graduated in 2022 and moved to work for Bravura Solutions.


- avatar: /images/members/sofia_monaci.png
  name: Sofia Monaci
  position: 
  socials:
  desc:
    Sofia Monaci first graduated in Biomedical Engineering at King’s College London in 2018, and she then went on to do 
    a MRes and PhD under the supervision of Dr Martin Bishop (via the Centre for Doctoral Training in Medical 
    Imaging Modalities).
    She is really enthusiastic and passionate about “'mending the heart” with engineering tools! <\p>

    <p>During her PhD, her research aimed at optimising ventricular tachycardia (VT) 
    treatments by utilising electrograms recordings stored in implanted devices, that the majority of VT patients have 
    in-situ. She first led an in-silico pace mapping to guide VT ablation planning non-invasively, and she then 
    implemented two computational-artificial intelligence (AI) platforms to automate the localisation of focal and 
    post-infarct VTs respectively, with a similar aim. Sofia graduated in 2022, and moved to work for Medtronic.

- avatar: /images/members/Phillip.jpg
  name: Philip Gemmell
  position:
  socials:
    - link: https://kclpure.kcl.ac.uk/portal/philip.gemmell.html
      icon: quote-right
  desc:
    After completing his MPhysPhil in Physics & Philosophy, Dr Philip Gemmell moved on to complete his DPhil in Systems 
    Biology at the University of Oxford, specialising in Computational Biology. His dissertation focussed on 
    reproducing experimentally observed variation in cardiac electrophysiology using variability in cellular ion 
    channels as the underlying cause, and the potential consequences of this variability in the cardiac response to 
    pathological conditions. He then expanded and refined these techniques while working at Clyde Biosciences while 
    looking to determine the mechanisms of variation between populations of stem cell derived heart cells. He 
    subsequently joined CEMRG until 2022, where he developed interest in whole torso computational modelling, with specific 
    focus on the effect of scar on the electrical dynamics of the heart, and how subtle changes in the clinical 
    observations can be used to determine properties of myocardial scar prior to imaging.

- avatar: /images/members/caroline-r.JPG
  name: Caroline Roney
  position:
  socials:
    - link: https://scholar.google.com/citations?user=xfRxPlUAAAAJ&hl=en&oi=ao
      icon: google
    - link: https://www.kcl.ac.uk/people/caroline-roney
      icon: quote-right
  desc:
    Dr Caroline Roney is a Medical Research Council Skills Development Fellow. She has a background in both 
    mathematics and biomedical engineering, with an MMath in Mathematics from the University of Oxford, and an MRes in 
    Biomedical Research from Imperial College London. She received her PhD degree in signal processing of cardiac 
    arrhythmia data from the Department of Bioengineering, Imperial College London, and then worked in the 
    computational modelling team at Liryc, Bordeaux. Since Caroline joined CEMRG in 2018, her research interests are 
    in developing engineering techniques for investigating the mechanisms that underlie atrial fibrillation. She uses a 
    combination of signal processing, machine learning and computational modelling techniques to develop novel methodologies for 
    investigating atrial fibrillation mechanisms from clinical imaging data and electrical recordings. The ultimate 
    aim of her research is to translate developed tools for analysing electrical and imaging data to clinically predict 
    optimal patient specific ablation strategies. In 2021 she started a role as a lecturer in Computational Medicine in 
    Queen Mary's University and a role as visiting lecturer in King's College London.


- avatar: /images/members/Marina-Riabiz.JPG
  name: Marina Riabiz
  position:
  socials:
    - link: https://scholar.google.com/citations?user=rICorMoAAAAJ&hl=en
      icon: google
    - link: https://kclpure.kcl.ac.uk/portal/marina.riabiz.html
      icon: quote-right
  desc:
    Marina Riabiz received her undergraduate and master’s degree in Mathematical Engineering from Politecnico di 
    Milano, Italy, specializing in Applied Statistics. Her PhD thesis 
    "On Latent Variable Models for Bayesian Inference with Stable Distributions and Processes" was in Information 
    Engineering, at the University of Cambridge, UK, where she was supervised by Prof. Simon Godsill. </p>
    
    <p> She joined the CEMRG group in October 2018, and she worked on uncertainty quantification for myocytes models, 
    under the guidance of Prof. Steven Niederer. She developed Monte Carlo methods for Bayesian parameter 
    inference in dynamical systems describing calcium transients and their contribution to the action potential in rat 
    cell models. The main goal of her project was to capture the variability of and covariance between calcium handling 
    proteins, the main challenge being the high dimensionality of the parameter space to be inferred. 
    The project was in collaboration with Prof. Chris Oates and other researchers form the Alan Turing Institute. 
    Marina’s broader research interests are at the intersection of probabilistic machine learning, statistics and 
    signal processing, applied to medical data. After leaving CEMRG in 2022, she started her role as lecturer in 
    Statistics at King's College London.


